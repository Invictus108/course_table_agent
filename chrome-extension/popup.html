<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Yale CourseAI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --yale: #00356b; --yale-light: #286dc0; --bg: #f8f6f1; --surface: #ffffff; --border: #e8e3da; --text: #1a1612; --muted: #8a8075; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 380px; height: 560px; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; overflow: hidden; }
    .header { background: var(--yale); padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
    .logo { width: 32px; height: 32px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--yale); flex-shrink: 0; }
    .header-text h1 { font-family: 'DM Serif Display', serif; font-size: 15px; color: white; font-weight: 400; }
    .header-text p { font-size: 10px; color: rgba(255,255,255,0.55); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; margin-left: auto; box-shadow: 0 0 8px rgba(74,222,128,0.6); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .msg { display: flex; gap: 8px; animation: fadeUp 0.3s ease both; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .avatar { width: 26px; height: 26px; border-radius: 7px; background: var(--yale); display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 11px; color: white; flex-shrink: 0; margin-top: 2px; }
    .bubble { max-width: 78%; padding: 10px 13px; border-radius: 14px; font-size: 13px; line-height: 1.55; }
    .msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 3px 14px 14px 14px; }
    .msg.user .bubble { background: var(--yale); color: white; border-radius: 14px 3px 14px 14px; }
    .course-card { background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--yale-light); border-radius: 10px; padding: 10px 12px; margin-top: 6px; transition: all 0.2s; }
    .course-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); transform: translateY(-1px); }
    .course-code { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--yale-light); font-weight: 600; margin-bottom: 2px; }
    .course-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .course-meta { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .course-rating { color: #d97706; }
    .dots { display: flex; gap: 4px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px 14px 14px 14px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2){animation-delay:0.15s} .dot:nth-child(3){animation-delay:0.3s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }
    .suggestions { padding: 0 16px 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { background: white; border: 1px solid var(--border); border-radius: 99px; padding: 4px 11px; font-size: 10.5px; color: var(--yale); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; font-weight: 500; }
    .chip:hover { background: var(--yale); color: white; border-color: var(--yale); }
    .input-area { padding: 10px 14px 14px; border-top: 1px solid var(--border); background: white; }
    .input-wrap { display: flex; gap: 8px; align-items: flex-end; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 8px 10px; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--yale-light); }
    textarea { flex: 1; background: transparent; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); resize: none; line-height: 1.5; max-height: 80px; }
    textarea::placeholder { color: var(--muted); }
    .send-btn { width: 32px; height: 32px; border-radius: 9px; background: var(--yale); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: white; font-size: 15px; }
    .send-btn:hover { background: var(--yale-light); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Y</div>
    <div class="header-text"><h1>Yale CourseAI</h1><p>Course Suggester</p></div>
    <div class="status-dot"></div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="suggestions">
    <button class="chip" data-query="easy distributional credit">Easy distrib</button>
    <button class="chip" data-query="popular intro class">Popular intro</button>
    <button class="chip" data-query="small seminar">Small seminar</button>
    <button class="chip" data-query="CS elective">CS elective</button>
    <button class="chip" data-query="humanities">Humanities</button>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="What kind of class are you looking for?"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
