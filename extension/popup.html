<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --yale: #00356b;
      --yale-light: #286dc0;
      --gold: #c9a84c;
      --bg: #060e1e;
      --surface: #0d1929;
      --surface2: #112036;
      --border: #1a2e4a;
      --text: #e8f0fe;
      --muted: #6b8ab0;
      --green: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px; min-height: 520px;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex; flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(0,53,107,0.4) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.1) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .header {
      position: relative; z-index: 1;
      padding: 16px 18px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,25,41,0.8);
      backdrop-filter: blur(20px);
    }
    .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--yale), var(--yale-light));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 17px; color: white; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(40,109,192,0.5);
    }
    .header-text h1 { font-family: 'Playfair Display', serif; font-size: 16px; color: white; font-weight: 600; }
    .header-text p { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .live-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.3);
      border-radius: 99px; padding: 3px 10px;
      font-size: 9px; color: var(--green);
      font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    }
    .live-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .hint {
      position: relative; z-index: 1;
      padding: 10px 18px; font-size: 11px; color: var(--muted);
      background: rgba(17,32,54,0.6);
      border-bottom: 1px solid var(--border); line-height: 1.5;
    }
    .hint a { color: var(--yale-light); text-decoration: none; font-weight: 500; }
    .body {
      position: relative; z-index: 1;
      padding: 16px; display: flex; flex-direction: column; gap: 16px; flex: 1;
    }
    .field-label {
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 8px;
    }
    select {
      width: 100%; padding: 11px 16px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface);
      font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text);
      appearance: none; cursor: pointer; transition: all 0.2s;
    }
    select:focus { outline: none; border-color: var(--yale-light); box-shadow: 0 0 0 3px rgba(40,109,192,0.15); }
    select:disabled { opacity: 0.4; cursor: not-allowed; }
    select option { background: #0d1929; }
    #meta {
      font-size: 11px; color: var(--muted);
      margin-top: 8px; line-height: 1.6;
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: 8px; border: 1px solid var(--border);
    }
    #courses ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    #courses li {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 14px 11px 17px;
      font-size: 13px; line-height: 1.45; color: var(--text);
      transition: all 0.2s; position: relative; overflow: hidden;
      animation: slideUp 0.35s ease both;
    }
    #courses li::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--yale-light), var(--gold));
    }
    #courses li:hover { border-color: var(--yale-light); background: var(--surface2); transform: translateX(2px); }
    #courses li:nth-child(1){animation-delay:0ms}
    #courses li:nth-child(2){animation-delay:50ms}
    #courses li:nth-child(3){animation-delay:100ms}
    #courses li:nth-child(4){animation-delay:150ms}
    #courses li:nth-child(5){animation-delay:200ms}
    #courses li:nth-child(6){animation-delay:250ms}
    #courses li:nth-child(7){animation-delay:300ms}
    #courses li:nth-child(8){animation-delay:350ms}
    @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .pill {
      display: inline-block; padding: 2px 9px;
      border: 1px solid rgba(40,109,192,0.3); border-radius: 999px;
      font-size: 10px; margin-left: 7px;
      color: var(--yale-light); background: rgba(40,109,192,0.1);
      font-weight: 600; vertical-align: middle;
    }
    .status-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 14px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    #status {
      font-family: ui-monospace, monospace;
      font-size: 11px; color: var(--muted);
      white-space: pre-wrap; line-height: 1.6;
    }
    #status.error { color: #f87171; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.3; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Y</div>
    <div class="header-text">
      <h1>Yale CourseAI</h1>
      <p>Worksheet Viewer</p>
    </div>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </div>
  <div class="hint">Log into <a href="https://coursetable.com" target="_blank">coursetable.com</a> first — we use your session to load your real courses.</div>
  <div class="body">
    <div>
      <div class="field-label">Select Worksheet</div>
      <select id="worksheetSelect" disabled><option>Loading…</option></select>
      <div id="meta"></div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="field-label">Your Courses</div>
      <div id="courses">—</div>
    </div>
    <div class="status-box">
      <div id="status" class="status">Initializing…</div>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
