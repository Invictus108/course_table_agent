<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 12px;
        width: 380px;
      }
      h3 { margin: 0 0 8px 0; }
      .hint { color: #555; font-size: 12px; margin-bottom: 10px; }
      select { width: 100%; padding: 8px; }
      .row { margin-top: 12px; }
      .status {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #333;
      }
      ul { margin: 8px 0 0 18px; padding: 0; }
      li { margin: 4px 0; }
      .muted { color: #666; font-size: 12px; }
      .error { color: #b00020; }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border: 1px solid #ddd;
        border-radius: 999px;
        font-size: 11px;
        margin-left: 6px;
        color: #444;
      }
    </style>
  </head>
  <body>
    <h3>Worksheets → Course names</h3>
    <div class="hint">
      Uses your existing Chrome login session (cookies). Open coursetable.com and make sure you’re logged in.
    </div>

    <div class="row">
      <label for="worksheetSelect"><b>Select worksheet</b></label>
      <select id="worksheetSelect" disabled>
        <option>Loading…</option>
      </select>
      <div id="meta" class="muted" style="margin-top:6px;"></div>
    </div>

    <div class="row">
      <b>Courses</b>
      <div id="courses" class="status">—</div>
    </div>

    <div class="row">
      <b>Status</b>
      <div id="status" class="status">Initializing…</div>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
